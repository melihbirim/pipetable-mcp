name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: pipetable-mcp-macos-universal
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: pipetable-mcp-windows-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: pipetable-mcp-linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: pipetable-mcp-linux-arm64

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ runner.os == 'macOS' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.artifact }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ matrix.artifact }}-cargo-

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update -q && sudo apt-get install -y cmake g++

      - name: Build macOS universal
        if: runner.os == 'macOS'
        run: |
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          lipo -create \
            target/aarch64-apple-darwin/release/pipetable-mcp \
            target/x86_64-apple-darwin/release/pipetable-mcp \
            -output pipetable-mcp-universal
          tar czf ${{ matrix.artifact }}.tar.gz pipetable-mcp-universal

      - name: Build Linux
        if: runner.os == 'Linux'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build Windows
        if: runner.os == 'Windows'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          cp target/${{ matrix.target }}/release/pipetable-mcp ${{ matrix.artifact }}
          tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Package Windows
        if: runner.os == 'Windows'
        run: |
          copy target\${{ matrix.target }}\release\pipetable-mcp.exe ${{ matrix.artifact }}.exe
          Compress-Archive -Path ${{ matrix.artifact }}.exe -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
